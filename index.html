<script>
// Unregister ALL service workers and clear caches so old broken versions don't serve
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(regs) {
    regs.forEach(function(r) { r.unregister(); });

<script>
window.onerror = function(msg, src, line, col, err) {
  var div = document.getElementById('global-err');
  if (!div) { div = document.createElement('div'); div.id='global-err'; div.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#7f1d1d;color:#fca5a5;font-family:monospace;font-size:11px;padding:10px;z-index:9999;max-height:40vh;overflow:auto;word-break:break-all'; document.body.appendChild(div); }
  div.innerHTML = '<b>Error:</b> ' + msg + '<br><b>Line:</b> ' + line + ' Col:' + col + (err&&err.stack?'<br>'+err.stack.split('\n').slice(0,4).join('<br>'):'');

// selectedDays = sorted array of day indices (0=Mon..6=Sun) the user picked
// workouts slot in order into those days

function getSessionLabel(sessionIdx, nDays) {
  var labels2 = ['Full Body A','Full Body B'];
  var labels3 = ['Push','Pull','Legs'];
  var labels4 = ['Push','Pull','Legs','Upper + Core'];
  var labels5 = ['Push','Pull','Legs','Upper','Lower'];
  var labels6 = ['Push A','Pull A','Legs A','Push B','Pull B','Legs B'];
  var map = {2:labels2,3:labels3,4:labels4,5:labels5,6:labels6};
  var arr = map[nDays] || labels4;
  return arr[sessionIdx] || 'Workout ' + (sessionIdx+1);
}

function getSessionColor(sessionIdx, nDays) {
  var info = SPLIT_INFO[nDays] || SPLIT_INFO[4];
  return info.sessionColors[sessionIdx] || '#8B5CF6';
}

// Dynamic helpers used throughout the app
function getDAY_TYPES() {
  return DAYS.map(function(_, di) {
    var sIdx = selectedDays.indexOf(di);
    if (sIdx >= 0) return getSessionLabel(sIdx, activeDays);
    return 'Rest';
  });
}

function getDAY_COLORS() {
  return DAYS.map(function(_, di) {
    var sIdx = selectedDays.indexOf(di);
    if (sIdx >= 0) return getSessionColor(sIdx, activeDays);
    return '#475569';
  });
}

function isWorkoutDay(di) { return selectedDays.indexOf(di) >= 0; }
function getDayWorkoutIndex(di) { return selectedDays.indexOf(di); }

function loadSuppData() {
  try {
    var defaultItems = suppItems.slice(); // save defaults before overwriting
    var si = localStorage.getItem('wt_supp_items');
    if (si) {
      suppItems = JSON.parse(si);
      // Merge subopts from defaults into loaded items (in case subopts were added after user saved)
      suppItems.forEach(function(item) {
        if (!item.subopts || item.subopts.length === 0) {
          var def = defaultItems.find(function(d){ return d.id === item.id; });
          if (def && def.subopts) item.subopts = def.subopts;
        }
      });
      // Add any default items not in saved data
      defaultItems.forEach(function(def) {
        if (!suppItems.find(function(it){ return it.id === def.id; })) {
          suppItems.push(def);
        }
      });
    }
    var sh = localStorage.getItem('wt_supp_hidden');
    if (sh) suppHidden = JSON.parse(sh);
    var ss = localStorage.getItem('wt_supp_subcats');
    if (ss) suppSubcats = JSON.parse(ss);
  } catch(e) {}
}

function saveSuppData() {
  localStorage.setItem('wt_supp_items', JSON.stringify(suppItems));
  localStorage.setItem('wt_supp_hidden', JSON.stringify(suppHidden));
  localStorage.setItem('wt_supp_subcats', JSON.stringify(suppSubcats));
}

function calcTargets(w) {
  const diet = GOALS[activeDiet] || GOALS['maintain'];
  const train = GOALS[activeTraining] || GOALS['hypertrophy'];
  const protein = Math.round(w * Math.max(diet.proMult || 1.0, train.proMult || 1.0));
  const calories = Math.round(w * diet.calMult + 50);
  const carbs = Math.round(calories * diet.carbPct / 4);
  const fat = Math.round(calories * diet.fatPct / 9);
  return { calories, protein, carbs, fat };
}

function getWeekMonday() {
  var d = new Date();
  var day = d.getDay(); // 0=Sun, 1=Mon...
  var diff = (day === 0) ? -6 : 1 - day; // adjust to Monday
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0, 10); // YYYY-MM-DD
}

function makeWeek() {
  var wd = getWorkoutDays();
  return DAYS.map(function(_, di) {
    var wIdx = selectedDays.indexOf(di);
    var dayWd = wIdx >= 0 ? wd[wIdx] : null;
    return {
      food: [],
      sc: {}, // suppChecked: {itemId: bool}
      water: 0,
      workoutDone: false,
      exDone: dayWd ? dayWd.exercises.map(function(){ return false; }) : [],
      sets: dayWd ? dayWd.exercises.map(function(ex){ return { name:ex.name, chosen:0, wu:'', s1:'', s2:'', s3:'', done:false }; }) : [],
    };
  });
}

function save() {
  try {
    localStorage.setItem('wt_week', JSON.stringify(week));
    localStorage.setItem('wt_weekdate', weekStartDate);
    localStorage.setItem('wt_weight', String(bodyWeight));
    localStorage.setItem('wt_supp', JSON.stringify(suppNutrition));
    localStorage.setItem('wt_training', activeTraining);
    localStorage.setItem('wt_days', String(activeDays));
    localStorage.setItem('wt_selecteddays', JSON.stringify(selectedDays));
    localStorage.setItem('wt_diet', activeDiet);
    localStorage.setItem('wt_savedfoods', JSON.stringify(savedFoods));
    localStorage.setItem('wt_history', JSON.stringify(workoutHistory));
  } catch(e) {}
}

function load() {
  try {
    const w = localStorage.getItem('wt_weight');
    if (w) bodyWeight = parseFloat(w) || 135;
    const st = localStorage.getItem('wt_training'); if (st && GOALS[st]) activeTraining = st;
    const sdays = localStorage.getItem('wt_days'); if (sdays) { const n = parseInt(sdays); if ([2,3,4,5,6].includes(n)) activeDays = n; }
    const ssd = localStorage.getItem('wt_selecteddays'); if (ssd) { try { const p = JSON.parse(ssd); if (Array.isArray(p)) selectedDays = p; } catch(e) {} }
    const sd = localStorage.getItem('wt_diet'); if (sd && GOALS[sd]) activeDiet = sd;
    const sf = localStorage.getItem('wt_savedfoods'); if (sf) { try { savedFoods = JSON.parse(sf); } catch(e) {} }
    const sh = localStorage.getItem('wt_history'); if (sh) { try { workoutHistory = JSON.parse(sh); } catch(e) {} }
    // supp items loaded via loadSuppData()
    const currentMonday = getWeekMonday();
    weekStartDate = currentMonday;
    const savedWeekDate = localStorage.getItem('wt_weekdate') || '';
    const isNewWeek = savedWeekDate !== currentMonday;
    const d = localStorage.getItem('wt_week');
    if (d && !isNewWeek) {
      const parsed = JSON.parse(d);
      const base = makeWeek();
      week = base.map(function(b, i) {
        var p = parsed[i] || {};
        return {
          food: p.food || b.food,
          sc: p.sc || p.suppChecked || p.supps || {},
          water: p.water || 0,
          workoutDone: p.workoutDone || false,
          exDone: p.exDone && p.exDone.length === b.exDone.length ? p.exDone : b.exDone,
          sets: p.sets && p.sets.length === b.sets.length
            ? p.sets.map(function(s, si) { return Object.assign({}, b.sets[si] || {}, s); })
            : b.sets,
        };
      });
    }
  } catch(e) {}
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function chip(label, color) {
  return `<span class="chip" style="background:${color}22;color:${color};border:1px solid ${color}44">${label}</span>`;
}

function dayTotals(di) {
  const fromFood = (week[di].food || []).reduce(
    (a, f) => {
      if (f.checked === false) return a; // unchecked = don't count
      return { cal:a.cal+f.cal, pro:a.pro+f.pro, carbs:a.carbs+f.carbs, fat:a.fat+f.fat };
    },
    { cal:0, pro:0, carbs:0, fat:0 }
  );
  var sc = week[di].sc || {};
  suppItems.forEach(function(item) {
    if (!suppHidden[item.id]) {
      // Count checked sub-options (use their specific macros)
      var hasCheckedSubopt = false;
      if (item.subopts) {
        item.subopts.forEach(function(opt) {
          if (sc[opt.id]) {
            fromFood.cal   += opt.cal   || 0;
            fromFood.pro   += opt.pro   || 0;
            fromFood.carbs += opt.carbs || 0;
            fromFood.fat   += opt.fat   || 0;
            hasCheckedSubopt = true;
          }
        });
      }
      // If no subopt checked but main item checked, use item macros
      if (!hasCheckedSubopt && sc[item.id]) {
        fromFood.cal   += item.cal   || 0;
        fromFood.pro   += item.pro   || 0;
        fromFood.carbs += item.carbs || 0;
        fromFood.fat   += item.fat   || 0;
      }
    }
  });
  return fromFood;
}

function macroBar(label, value, target, color) {
  const pct = Math.round((value / target) * 100);
  const over = pct > 100;
  const barPct = Math.min(100, pct);
  const unit = label === 'Calories' ? 'cal' : 'g';
  const pctColor = over ? '#EF4444' : color;
  const barColor = over ? '#EF4444' : color;
  const barStyle = over ? `width:100%;background:${barColor};box-shadow:0 0 6px ${barColor}` : `width:${barPct}%;background:${barColor}`;
  return `<div class="macro-bar">
    <div class="macro-row"><span class="macro-label">${label}</span>
    <span style="color:#94A3B8">${Math.round(value)}<span style="color:#475569">/${target}${unit}</span> <span style="color:${pctColor};font-weight:700">${pct}%${over?' ▲':''}</span></span></div>
    <div class="macro-track"><div class="macro-fill" style="${barStyle}"></div></div>
  </div>`;
}


function getSubcats(cat) {
  return (suppSubcats[cat] || []);
}

function itemsInSubcat(cat, scId) {
  return suppItems.filter(function(s){ return s.cat===cat && s.subcat===scId && !suppHidden[s.id]; });
}

function itemsNoSubcat(cat) {
  return suppItems.filter(function(s){ return s.cat===cat && !s.subcat && !suppHidden[s.id]; });
}

function addSubcat(cat, label) {
  if (!label || !label.trim()) return;
  if (!suppSubcats[cat]) suppSubcats[cat] = [];
  var id = 'sc_' + Date.now();
  suppSubcats[cat].push({ id: id, label: label.trim() });
  saveSuppData();
  suppOpenAddSubcat[cat] = false;
  renderPage(activeTab);
}

function removeSubcat(cat, scId) {
  // move items back to no-subcat
  suppItems.forEach(function(s){ if (s.cat===cat && s.subcat===scId) delete s.subcat; });
  suppSubcats[cat] = (suppSubcats[cat]||[]).filter(function(s){ return s.id!==scId; });
  saveSuppData();
  renderPage(activeTab);
}

function toggleSubcat(cat, scId) {
  var key = cat+'__'+scId;
  suppOpenSubcat = (suppOpenSubcat === key) ? null : key;
  renderPage(activeTab);
}


function setSuppAddSubcatOpen(key, val) { suppOpenAddSubcat[key] = val; renderPage(activeTab); }
function setSuppAddItemSubcat(cat, sc) { suppAddItemSubcat[cat] = sc; renderPage(activeTab); }

function submitAddSubcat(cat) {
  var inp = document.getElementById('new-subcat-input-'+cat);
  if (!inp || !inp.value.trim()) return;
  addSubcat(cat, inp.value.trim());
}

    + 'oninput="liveWater(this)">'
    + '<div id="wmsg" style="font-size:10px;color:#475569;text-align:center;margin-top:5px">'
    + (oz === 0 ? 'Slide to log water' : oz >= OZ_GOAL ? '🎉 Goal reached!' : (OZ_GOAL - oz) + ' oz to go')
    + '</div></div>';
}

function liveWater(slider) {
  const oz = parseInt(slider.value);
  const OZ_GOAL = 64;
  const pct = Math.min(100, Math.round((oz / OZ_GOAL) * 100));
  const color = oz >= OZ_GOAL ? '#10B981' : oz >= 40 ? '#0EA5E9' : oz >= 24 ? '#F59E0B' : '#EF4444';
  const cups = (oz / 8).toFixed(1).replace('.0', '');
  slider.style.background = 'linear-gradient(90deg,' + color + ' 0%,' + color + ' ' + pct + '%,#334155 ' + pct + '%,#334155 100%)';
  const bar = document.getElementById('wbar');
  if (bar) { bar.style.width = pct + '%'; bar.style.background = color; }
  const cupsOz = document.getElementById('wcupsoz');
  if (cupsOz) cupsOz.innerHTML = '<div style="font-size:13px;font-weight:700;color:' + color + '">' + cups + ' / 8 cups' + (oz >= OZ_GOAL ? ' ✓' : '') + '</div><div style="font-size:11px;font-weight:600;color:' + color + '">' + oz + ' / 64 oz</div>';
  const pctEl = document.getElementById('wpct');
  if (pctEl) { pctEl.textContent = pct + '%'; pctEl.style.color = color; }
  const msg = document.getElementById('wmsg');
  if (msg) msg.textContent = oz === 0 ? 'Slide to log water' : oz >= OZ_GOAL ? '🎉 Goal reached!' : (OZ_GOAL - oz) + ' oz to go';
  week[activeDay].water = oz;
  save();
}

// ─── WORKOUT ──────────────────────────────────────────────────────────────────
function goalReps(defaultReps) {
  // Adjust rep ranges based on active goal
  if (activeTraining === 'strength') {
    // Reduce reps for strength - heavy and low
    return defaultReps.replace(/(\d+)-(\d+)/, function(m, lo, hi) {
      return Math.max(1, Math.round(parseInt(lo)*0.5)) + '-' + Math.max(3, Math.round(parseInt(hi)*0.55));
    });
  } else if (activeDiet === 'slow-cut' || activeDiet === 'moderate-cut' || activeDiet === 'aggressive-cut') {
    // Higher reps for cuts
    return defaultReps.replace(/(\d+)-(\d+)/, function(m, lo, hi) {
      return Math.round(parseInt(lo)*1.2) + '-' + Math.round(parseInt(hi)*1.25);
    });
  }
  // hypertrophy / bulk = default reps
  return defaultReps;
}

function buildExCard(s, wi, wd, color) {
  var ex = wd.exercises[wi];
  var chosen = s.chosen || 0;
  var exName = chosen === 0 ? ex.name : ex.alts[chosen-1];
  var ytUrl = 'https://www.youtube.com/results?search_query=' + encodeURIComponent(exName + ' proper form tutorial');
  var allDone = (s.s1_w && s.s1_r) && (s.s2_w && s.s2_r) && (s.s3_w && s.s3_r) && (ex.sets < 4 || (s.s4_w && s.s4_r)) && (ex.sets < 5 || (s.s5_w && s.s5_r));
  var swapKey = String(activeDay)+'_'+String(wi);
  var showSwap = swapExOpen === swapKey;
  var restTime = activeTraining==='strength' ? '4 min' : activeDiet.includes('cut') ? '60 sec' : '90 sec';

  var html = '<div class="ex-card" style="border-color:'+(allDone?'#10B981':'')+';background:'+(allDone?'#10B98108':'')+'">';

  // Header
  html += '<div class="ex-header">';
  html += '<div style="flex:1;min-width:0;margin-right:8px">';
  html += '<div class="ex-name" onclick="toggleSwapEx('+activeDay+','+wi+')" style="cursor:pointer;display:flex;align-items:center;gap:6px">';
  html += '<span>'+exName+'</span>';
  html += '<span style="font-size:11px;color:#475569;font-weight:700;font-family:Barlow Condensed,Arial Narrow,Arial,sans-serif">'+(showSwap?'▲':'▼')+'</span>';
  html += '</div>';
  html += '<div class="ex-meta" style="color:'+color+'">'+ex.sets+' sets × '+goalReps(ex.reps)+'</div>';
  html += '</div>';
  html += '<div class="ex-btns">';
  html += '<a href="'+ytUrl+'" target="_blank" class="ex-btn" style="text-decoration:none">🎥</a>';
  html += '<button class="ex-btn" onclick="openExModal('+activeDay+','+wi+')">Form</button>';
  html += '</div>';
  html += '</div>';

  // Swap panel
  if (showSwap) {
    html += '<div style="background:#1E293B;border:1px solid #334155;border-radius:8px;padding:8px;margin-bottom:8px">';
    html += '<div style="font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:0.1em;color:#475569;font-family:Barlow Condensed,Arial Narrow,Arial,sans-serif;margin-bottom:6px">Swap Exercise</div>';
    html += '<div style="display:flex;flex-direction:column;gap:4px">';
    // Default option
    html += '<div data-day="'+activeDay+'" data-wi="'+wi+'" data-val="0" onclick="swapExercise(parseInt(this.dataset.day),parseInt(this.dataset.wi),this.dataset.val)" style="padding:8px 10px;border-radius:7px;border:1px solid '+(chosen===0?color:'#334155')+';background:'+(chosen===0?color+'20':'transparent')+';cursor:pointer;display:flex;align-items:center;gap:8px">';
    html += '<div style="width:14px;height:14px;border-radius:50%;border:2px solid '+(chosen===0?color:'#475569')+';background:'+(chosen===0?color:'transparent')+';flex-shrink:0"></div>';
    html += '<span style="font-size:13px;font-weight:900;font-family:Barlow Condensed,Arial Narrow,Arial,sans-serif;color:'+(chosen===0?color:'#94A3B8')+'">⭐ '+ex.name+'</span>';
    html += '</div>';
    // Alternatives
    ex.alts.forEach(function(alt, ai) {
      html += '<div data-day="'+activeDay+'" data-wi="'+wi+'" data-val="'+(ai+1)+'" onclick="swapExercise(parseInt(this.dataset.day),parseInt(this.dataset.wi),this.dataset.val)" style="padding:8px 10px;border-radius:7px;border:1px solid '+(chosen===ai+1?color:'#334155')+';background:'+(chosen===ai+1?color+'20':'transparent')+';cursor:pointer;display:flex;align-items:center;gap:8px">';
      html += '<div style="width:14px;height:14px;border-radius:50%;border:2px solid '+(chosen===ai+1?color:'#475569')+';background:'+(chosen===ai+1?color:'transparent')+';flex-shrink:0"></div>';
      html += '<span style="font-size:13px;font-weight:900;font-family:Barlow Condensed,Arial Narrow,Arial,sans-serif;color:'+(chosen===ai+1?color:'#94A3B8')+'">'+alt+'</span>';
      html += '</div>';
    });
    html += '</div></div>';
  }

  // Set grid — two inputs per set (weight + reps)
  var setFields = [['wu','Warm-Up'],['s1','Set 1'],['s2','Set 2'],['s3','Set 3']];
  if (ex.sets >= 4) setFields.push(['s4','Set 4']);
  if (ex.sets >= 5) setFields.push(['s5','Set 5']);
  html += '<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:6px">';
  setFields.forEach(function(pair) {
    var field = pair[0], label = pair[1];

    var rVal = s[field+'_r'] || '';

    html += '<div style="display:flex;gap:6px">';

    var wFilled = wVal ? 'background:#10B98118;border-color:#10B981;color:#10B981' : '';

    html += '<div style="font-size:9px;font-weight:700;color:#475569;font-family:Barlow Condensed,Arial Narrow,Arial,sans-serif;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:2px">Weight (lbs)</div>';

    html += '<input type="number" class="set-input" placeholder="0" value="'+rVal+'" oninput="updateSet('+wi+',\''+field+'_r\',this.value,this)" style="width:100%;box-sizing:border-box;'+rFilled+'">';
    html += '</div>';
    html += '</div></div>';
  });
  html += '</div>';

  // Rest timer
  html += '<button onclick="startRestTimer()" style="width:100%;margin-top:8px;background:#1E293B;border:1px solid #334155;border-radius:8px;padding:8px;color:#94A3B8;font-size:12px;font-weight:700;cursor:pointer;font-family:Barlow Condensed,Arial Narrow,Arial,sans-serif">⏱ Start Rest Timer ('+restTime+')</button>';

  html += '</div>';
  return html;
}

var _searchTimer = null;
var _lastSearchResults = [];

function searchFood(query) {
  var results = document.getElementById('food-search-results');
  if (!results) return;
  query = query.trim();
  if (query.length < 2) { results.innerHTML = ''; return; }

  // Debounce — wait 400ms after user stops typing
  clearTimeout(_searchTimer);
  results.innerHTML = '<div style="text-align:center;padding:14px;color:#475569;font-size:12px;font-family:Barlow Condensed,Arial Narrow,Arial,sans-serif;font-weight:700">Searching...</div>';

  _searchTimer = setTimeout(function() {
    fetchFoodResults(query, results);
  }, 400);
}

function fetchFoodResults(query, resultsEl) {
  var q = query.toLowerCase();
  var matches = FOOD_DB.filter(function(f) {
    return f.n.toLowerCase().includes(q);
  }).slice(0, 10);

  if (matches.length === 0) {
    resultsEl.innerHTML = '<div style="font-size:12px;color:#475569;text-align:center;padding:14px">No results for "' + query + '"</div>';
    _lastSearchResults = [];
    return;
  }

  _lastSearchResults = matches;
  var p = (window._theme && window._theme.p) || '#8B5CF6';
  resultsEl.innerHTML = matches.map(function(f, i) {
    var alreadySaved = savedFoods.some(function(s) { return s.n === f.n; });
    return '<div style="padding:10px 0;border-bottom:1px solid #1E293B;display:flex;align-items:center;gap:10px">'
      + '<div style="flex:1;min-width:0">'
      + '<div style="font-size:13px;font-weight:900;color:#E2E8F0;font-family:Barlow Condensed,Arial Narrow,Arial,sans-serif;margin-bottom:3px">' + f.n + '</div>'
      + '<div style="display:flex;gap:8px">'
      + '<span style="font-size:11px;font-weight:900;color:' + p + ';font-family:Barlow Condensed,Arial Narrow,Arial,sans-serif">' + f.cal + ' cal</span>'
      + '<span style="font-size:11px;color:#10B981;font-weight:700">' + f.pro + 'g pro</span>'
      + '<span style="font-size:11px;color:#F59E0B;font-weight:700">' + f.carbs + 'g carbs</span>'
      + '<span style="font-size:11px;color:#EF4444;font-weight:700">' + f.fat + 'g fat</span>'
      + '</div></div>'
      + '<button data-idx="' + i + '" onclick="addSearchFoodToList(this)" style="flex-shrink:0;padding:6px 14px;border-radius:8px;border:none;background:' + (alreadySaved ? '#10B98120' : p + '25') + ';color:' + (alreadySaved ? '#10B981' : p) + ';font-size:13px;font-weight:900;cursor:pointer;font-family:Barlow Condensed,Arial Narrow,Arial,sans-serif">' + (alreadySaved ? '✓ Saved' : '+ Add') + '</button>'
      + '</div>';
  }).join('');
}

          </div>

// ─── FOOD ACTIONS ─────────────────────────────────────────────────────────────
function addFood() {
  if (!foodDraft.name) return;
  const entry = { id:Date.now(), name:foodDraft.name, cal:parseFloat(foodDraft.cal)||0, pro:parseFloat(foodDraft.pro)||0, carbs:parseFloat(foodDraft.carbs)||0, fat:parseFloat(foodDraft.fat)||0, checked:true, qty:1, baseQty:{cal:parseFloat(foodDraft.cal)||0,pro:parseFloat(foodDraft.pro)||0,carbs:parseFloat(foodDraft.carbs)||0,fat:parseFloat(foodDraft.fat)||0} };
  week[activeDay].food.push(entry);
  foodDraft = { name:'', cal:'', pro:'', carbs:'', fat:'' };
  save(); renderPage('nutrition');
}

function changeFoodQty(id, delta) {
  var item = week[activeDay].food.find(function(f){ return f.id === id; });
  if (!item) return;
  if (!item.baseQty) item.baseQty = { cal:item.cal, pro:item.pro, carbs:item.carbs, fat:item.fat };
  var newQty = Math.max(1, ((item.qty || 1) + delta));
  // round to nearest 0.5
  
  item.qty = newQty;
  item.cal   = Math.round(item.baseQty.cal   * newQty * 10) / 10;
  item.pro   = Math.round(item.baseQty.pro   * newQty * 10) / 10;
  item.carbs = Math.round(item.baseQty.carbs * newQty * 10) / 10;
  item.fat   = Math.round(item.baseQty.fat   * newQty * 10) / 10;
  save();
  renderPage(activeTab);
}

function toggleFoodCheck(id) {
  var item = week[activeDay].food.find(function(f){ return f.id === id; });
  if (!item) return;
  item.checked = (item.checked === false) ? true : false;
  save();
  renderPage(activeTab);
}

function removeFood(id) {
  week[activeDay].food = week[activeDay].food.filter(f => f.id !== id);
  save(); renderPage('nutrition');
}

function toggleSupp(key) {
  if (week[activeDay].supps[key] === undefined) week[activeDay].supps[key] = false;
  week[activeDay].supps[key] = !week[activeDay].supps[key];
  save(); renderPage('today');
  if (activeTab==='nutrition') renderPage('nutrition');
  renderDayBar();
}

function chooseExercise(wi, val) {
  if (week[activeDay].sets[wi]) {
    week[activeDay].sets[wi].chosen = parseInt(val);
    save();
    // sync workout tab if open
    if (activeTab === 'workout') renderPage('workout');
  }
}

function toggleExDone(wi) {
  if (week[activeDay].sets[wi]) {
    week[activeDay].sets[wi].done = !week[activeDay].sets[wi].done;
    save();
    renderPage('today');
    if (activeTab === 'workout') renderPage('workout');
    renderDayBar();
  }
}

function updateSet(wi, field, val, inputEl) {
  if (week[activeDay].sets[wi]) {
    week[activeDay].sets[wi][field] = val;
    save();
    renderDayBar();
    // Color input green if filled, reset if empty
    if (inputEl) {
      var p = (window._theme && window._theme.p) || '#10B981';
      if (val && val.trim() !== '') {
        inputEl.style.background = '#10B98118';
        inputEl.style.borderColor = '#10B981';
        inputEl.style.color = '#10B981';
      } else {
        inputEl.style.background = '';
        inputEl.style.borderColor = '';
        inputEl.style.color = '';
      }
    }
    // Start rest timer when reps logged for a working set (not warm-up)
    if (field !== 'wu' && field.endsWith('_r') && val && val.trim() !== '') {
      startRestTimer();
    }
  }
}

function calcTargetsFor(w, goalKey) {
  const g = GOALS[goalKey] || GOALS['hypertrophy'];
  const protein = Math.round(w * g.proMult);
  const calories = Math.round(w * g.calMult + 50);
  const carbs = Math.round(calories * g.carbPct / 4);
  const fat = Math.round(calories * g.fatPct / 9);
  return { calories, protein, carbs, fat };
}

function setActiveDays(n) {
  activeDays = n;
  // When day count changes, auto-pick first n days of week as default
  // but keep existing selectedDays if count matches
  if (selectedDays.length !== n) {
    selectedDays = [];
    for (var i = 0; i < n; i++) selectedDays.push(i);
  }
  WORKOUT_DAYS = getWorkoutDays();
  week = makeWeek();
  save();
  renderDayBar();
  renderPage('goals');
  renderPage('today');
  renderPage('workout');
}

function toggleSelectedDay(di) {
  var idx = selectedDays.indexOf(di);
  if (idx >= 0) {
    // Deselect — must keep at least 2
    if (selectedDays.length <= 2) return;
    selectedDays.splice(idx, 1);
  } else {
    // Select — max 6
    if (selectedDays.length >= 6) return;
    selectedDays.push(di);
    selectedDays.sort(function(a,b){ return a-b; });
  }
  // activeDays drives the split — update it from count
  activeDays = Math.min(Math.max(selectedDays.length, 2), 6);
  WORKOUT_DAYS = getWorkoutDays();
  week = makeWeek();
  save();
  renderDayBar();
  renderPage('goals');
  renderPage('today');
  renderPage('workout');
}

function setGoal(key, type) {
  if (!GOALS[key]) return;
  if (type === 'training') activeTraining = key;
  else activeDiet = key;
  save();
  updateGoalBadge();
  updateWeightDisplay();
  renderDayBar();
  renderPage('goals');
  renderPage('today');

  renderPage('workout');
  renderPage('overview');
  switchTab('goals');

// ─── REST TIMER ───────────────────────────────────────────────────────────────
var restTimerInterval = null;
var restTimerTotal = 0;
var restTimerLeft = 0;

function getRestSeconds() {
  if (activeTraining === 'strength') return 240; // 4 min
  if (activeDiet.includes('cut')) return 60;      // 1 min
  return 90;                                       // 1.5 min default
}

function startRestTimer() {
  stopRestTimer();
  restTimerTotal = getRestSeconds();
  restTimerLeft = restTimerTotal;
  var bar = document.getElementById('rest-timer-bar');
  if (bar) { bar.style.display = 'flex'; bar.style.setProperty('display','flex','important'); }
  updateRestTimerDisplay();
  restTimerInterval = setInterval(function() {
    restTimerLeft--;
    updateRestTimerDisplay();
    if (restTimerLeft <= 0) {
      stopRestTimer();
      // Vibrate if supported
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      var disp = document.getElementById('rest-timer-display');
      if (disp) { disp.textContent = 'GO!'; disp.style.color = '#10B981'; }
      setTimeout(function() {
        var b = document.getElementById('rest-timer-bar');
        if (b) b.style.display = 'none';
      }, 2000);
    }
  }, 1000);
}

function updateRestTimerDisplay() {
  var disp = document.getElementById('rest-timer-display');
  var fill = document.getElementById('rest-timer-bar-fill');
  if (!disp) return;
  var m = Math.floor(restTimerLeft / 60);
  var s = restTimerLeft % 60;
  disp.textContent = m + ':' + (s < 10 ? '0' : '') + s;
  disp.style.color = restTimerLeft <= 10 ? '#EF4444' : restTimerLeft <= 30 ? '#F59E0B' : '#E2E8F0';
  var pct = restTimerTotal > 0 ? (restTimerLeft / restTimerTotal) * 100 : 100;
  var color = restTimerLeft <= 10 ? '#EF4444' : restTimerLeft <= 30 ? '#F59E0B' : '#8B5CF6';
  if (fill) { fill.style.width = pct + '%'; fill.style.background = color; }
}

function stopRestTimer() {
  if (restTimerInterval) { clearInterval(restTimerInterval); restTimerInterval = null; }
  var bar = document.getElementById('rest-timer-bar');
  if (bar) bar.style.display = 'none';
}

function skipRestTimer() {
  stopRestTimer();
}

function handleSaveSession(btn) {
  var result = saveWorkoutToHistory();
  if (!result) {
    // No sets logged
    btn.textContent = '⚠️ Log some sets first!';
    btn.style.background = '#F59E0B';
    setTimeout(function() {
      btn.textContent = '💾 Save Session to History';
      btn.style.background = '#10B981';
    }, 2000);
    return;
  }
  btn.textContent = '✓ Saved! View in History tab';
  btn.style.background = '#059669';
  btn.disabled = true;
  setTimeout(function() {
    btn.textContent = '💾 Save Session to History';
    btn.style.background = '#10B981';
    btn.disabled = false;
  }, 3000);
}

function saveWorkoutToHistory() {
  var wdMap = getWorkoutDays(); var wdIdx2 = getDayWorkoutIndex(activeDay); var wd = wdIdx2 >= 0 ? wdMap[wdIdx2] : null;
  if (!wd) return;
  var d = week[activeDay];
  // Only save if at least one working set was logged
  var hasData = d.sets.some(function(s) { return s.s1 || s.s2 || s.s3; });
  if (!hasData) return false;

  var now = new Date();
  var dateStr = now.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });

  var entry = {
    date: dateStr,
    timestamp: now.getTime(),
    day: DAYS[activeDay],
    dayType: getDAY_TYPES()[activeDay],
    label: wd.label,
    muscles: wd.muscles,
    training: activeTraining,
    diet: activeDiet,
    exercises: d.sets.map(function(s, i) {
      var ex = wd.exercises[i];
      if (!ex) return null;
      var chosen = s.chosen || 0;
      return {
        name: chosen === 0 ? ex.name : ex.alts[chosen - 1],
        reps: goalReps(ex.reps),
        wu_w: s.wu_w||'', wu_r: s.wu_r||'',
        s1_w: s.s1_w||'', s1_r: s.s1_r||'',
        s2_w: s.s2_w||'', s2_r: s.s2_r||'',
        s3_w: s.s3_w||'', s3_r: s.s3_r||'',
        s4_w: s.s4_w||'', s4_r: s.s4_r||'',
        s5_w: s.s5_w||'', s5_r: s.s5_r||''
      };
    }).filter(Boolean)
  };

  // Remove duplicate for same day if already saved today
  var today = new Date(); today.setHours(0,0,0,0);
  workoutHistory = workoutHistory.filter(function(h) {
    var hd = new Date(h.timestamp); hd.setHours(0,0,0,0);
    return !(hd.getTime() === today.getTime() && h.day === DAYS[activeDay]);
  });

  workoutHistory.unshift(entry); // newest first
  if (workoutHistory.length > 100) workoutHistory = workoutHistory.slice(0, 100);
  save();
  renderPage('history'); // pre-render so it's ready when they switch
  return true;
}

    html += '<div>';
    html += '<div style="font-size:15px;font-weight:900;color:#E2E8F0;font-family:Barlow Condensed,Arial Narrow,Arial,sans-serif">' + entry.label + '</div>';
    html += '<div style="font-size:11px;color:#64748B;margin-top:1px">' + entry.date + '</div>';
    html += '<div style="font-size:10px;color:#475569;margin-top:2px">' + entry.muscles + '</div>';
    html += '</div>';
    html += '<div style="display:flex;flex-direction:column;gap:3px;align-items:flex-end">';
    html += '<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;background:' + gt.color + '20;color:' + gt.color + '">' + gt.emoji + ' ' + gt.label + '</span>';
    html += '<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;background:' + gd.color + '20;color:' + gd.color + '">' + gd.emoji + ' ' + gd.label + '</span>';
    html += '</div></div>';

    // Exercises
    entry.exercises.forEach(function(ex) {
      var setKeys = [['wu','WU'],['s1','S1'],['s2','S2'],['s3','S3'],['s4','S4'],['s5','S5']];
      var hasData = setKeys.some(function(k){ return ex[k[0]+'_w'] || ex[k[0]+'_r']; });
      if (!hasData) return;
      html += '<div style="padding:7px 0;border-top:1px solid #1E293B">';
      html += '<div style="font-size:12px;font-weight:900;color:#94A3B8;font-family:Barlow Condensed,Arial Narrow,Arial,sans-serif;margin-bottom:5px">' + ex.name + '</div>';
      html += '<div style="display:flex;gap:5px;flex-wrap:wrap">';
      setKeys.forEach(function(k) {
        var w = ex[k[0]+'_w'], r = ex[k[0]+'_r'];
        if (!w && !r) return;
        html += '<div style="background:#1E293B;border:1px solid #334155;border-radius:7px;padding:5px 8px;min-width:52px;text-align:center">';
        html += '<div style="font-size:9px;font-weight:900;color:#475569;font-family:Barlow Condensed,Arial Narrow,Arial,sans-serif;text-transform:uppercase;margin-bottom:2px">'+k[1]+'</div>';
        html += '<div style="font-size:12px;font-weight:900;color:#E2E8F0;font-family:Barlow Condensed,Arial Narrow,Arial,sans-serif">'+(w||'—')+'lbs</div>';
        html += '<div style="font-size:11px;color:#10B981;font-weight:700;font-family:Barlow Condensed,Arial Narrow,Arial,sans-serif">×'+(r||'—')+'</div>';
        html += '</div>';
      });
      html += '</div></div>';
    });

    // Delete button
    html += '<button data-ei="' + ei + '" onclick="deleteHistoryEntry(parseInt(this.dataset.ei))" style="margin-top:8px;background:none;border:none;color:#475569;font-size:11px;cursor:pointer;padding:0">🗑 Delete this session</button>';
    html += '</div>';
  });

  return html;
}

function deleteHistoryEntry(idx) {
  workoutHistory.splice(idx, 1);
  save();
  renderPage('history');
}

function clearAllHistory() {
  workoutHistory = [];
  save();
  renderPage('history');
}

// ─── THEME SYSTEM ─────────────────────────────────────────────────────────────
const THEMES = {
  // primary = main accent, secondary = complementary accent for variety
  purple: { name:'Purple',  sub:'Default',     emoji:'💜', primary:'#8B5CF6', secondary:'#06B6D4', accent3:'#EC4899', bg:'#060D1A', bg2:'#0D1728', bg3:'#0F172A', border:'#1E3A5F', border2:'#334155', card:'#0F172A', header:'linear-gradient(90deg,#0F2040,#0D1A35)' },
  green:  { name:'Green',   sub:'Performance', emoji:'💚', primary:'#10B981', secondary:'#3B82F6', accent3:'#F59E0B', bg:'#060D0A', bg2:'#0A1A0F', bg3:'#091510', border:'#1A3D2B', border2:'#1F4D35', card:'#091510', header:'linear-gradient(90deg,#071A10,#0A2418)' },
  orange: { name:'Orange',  sub:'Aggressive',  emoji:'🧡', primary:'#F97316', secondary:'#FBBF24', accent3:'#EF4444', bg:'#0D0804', bg2:'#1A0F06', bg3:'#120A04', border:'#3D1F08', border2:'#4D2A0A', card:'#120A04', header:'linear-gradient(90deg,#1A0E05,#221208)' },
  cyan:   { name:'Cyan',    sub:'Futuristic',  emoji:'🩵', primary:'#06B6D4', secondary:'#8B5CF6', accent3:'#10B981', bg:'#04090D', bg2:'#06121A', bg3:'#050D13', border:'#0E3A4D', border2:'#124D66', card:'#050D13', header:'linear-gradient(90deg,#051218,#071A24)' },
  red:    { name:'Red',     sub:'Intensity',   emoji:'❤️', primary:'#EF4444', secondary:'#F97316', accent3:'#FBBF24', bg:'#0D0404', bg2:'#1A0606', bg3:'#120404', border:'#3D0E0E', border2:'#4D1212', card:'#120404', header:'linear-gradient(90deg,#1A0505,#220808)' },
  gold:   { name:'Gold',    sub:'Elite',       emoji:'🏆', primary:'#F59E0B', secondary:'#F97316', accent3:'#EF4444', bg:'#0A0800', bg2:'#151000', bg3:'#100D00', border:'#3D2E00', border2:'#4D3A00', card:'#100D00', header:'linear-gradient(90deg,#130F00,#1C1500)' },
  rose:   { name:'Rose',    sub:'Fresh',       emoji:'🌸', primary:'#F43F5E', secondary:'#A855F7', accent3:'#FB923C', bg:'#0D0407', bg2:'#1A060C', bg3:'#12040A', border:'#3D0E1E', border2:'#4D1228', card:'#12040A', header:'linear-gradient(90deg,#1A0508,#220A12)' },
  blue:   { name:'Blue',    sub:'Classic',     emoji:'💙', primary:'#3B82F6', secondary:'#06B6D4', accent3:'#8B5CF6', bg:'#04070D', bg2:'#060D1A', bg3:'#050A13', border:'#0E1E3D', border2:'#12284D', card:'#050A13', header:'linear-gradient(90deg,#050D1A,#071224)' },
  light:  { name:'Light',   sub:'Minimal',     emoji:'🤍', primary:'#6366F1', secondary:'#06B6D4', accent3:'#10B981', bg:'#F1F5F9', bg2:'#E2E8F0', bg3:'#F8FAFC', border:'#CBD5E1', border2:'#CBD5E1', card:'#FFFFFF', header:'linear-gradient(90deg,#E2E8F0,#F1F5F9)', isLight:true },
};

let activeTheme = 'purple';

function getTheme() { return THEMES[activeTheme] || THEMES.purple; }

function applyTheme(key) {
  const t = THEMES[key];
  if (!t) return;
  activeTheme = key;
  localStorage.setItem('wt_theme', key);

  const styleEl = document.getElementById('dynamic-theme') || (() => {
    const s = document.createElement('style');
    s.id = 'dynamic-theme';
    document.head.appendChild(s);
    return s;
  })();

  const p   = t.primary;    // main accent — buttons, active states, highlights
  const sec = t.secondary;  // secondary accent — macro bars, water, chips, tags
  const a3  = t.accent3;    // third accent — protein bar, supp icons, small details
  activeThemeIsLight = t.isLight || false;
  const textColor = t.isLight ? '#0F172A' : '#E2E8F0';
  const textMuted = t.isLight ? '#475569' : '#94A3B8';
  const textFaint = t.isLight ? '#94A3B8' : '#475569';
  const inputBg   = t.isLight ? '#F1F5F9' : t.border2 + '50';

  styleEl.textContent = `
    html,body { background:${t.bg}!important; color:${textColor}!important; }
    body { background:linear-gradient(160deg,${t.bg} 0%,${t.bg2} 60%,${t.bg} 100%); }
    #header { background:${t.header}; border-bottom-color:${t.border}; }
    .card { background:${t.card}!important; border-color:${t.border2}; }

    /* tabs */
    .tab-btn { color:${textFaint}; }
    .tab-btn.active { color:${t.isLight ? '#1E293B' : '#FFFFFF'}; background:${p}; border-bottom:2px solid ${p}; border-radius:6px; }

    /* day bar */
    .day-btn { border-color:${t.border2}; color:${textFaint}; }

    /* typography */
    .sec-title { color:${textFaint}; }
    .page-sub { color:${textFaint}; }
    .weight-val { color:${textColor}; }
    .weight-stats { color:${textFaint}; }

    /* weight row — primary */
    .weight-row { background:${p}10; border-color:${p}30; }
    .edit-badge { background:${p}20; border-color:${p}40; color:${p}; }

    /* macro bars — secondary color for variety */
    .macro-track { background:${t.border2}60; }

    /* inputs */
    input[type=text],input[type=number],select {
      background:${inputBg}; border-color:${t.border2};
      color:${textColor};
    }
    .set-label { color:${textFaint}; }

    /* exercise cards */
    .ex-card { background:${t.card}; border-color:${t.border2}; }
    .ex-name { color:${textColor}; }
    .ex-meta { color:${textMuted}; }
    .set-grid input { border-color:${p}40; }

    /* supplement rows */
    .supp-row { background:${t.card}; border-color:${t.border2}; }
    .supp-label { color:${textMuted}; }

    /* checklist */
    .check-row { border-bottom-color:${t.border2}; color:${textColor}; }
    .food-item { border-bottom-color:${t.border2}; color:${textColor}; }
    .food-item-guide { border-bottom-color:${t.border2}; color:${textColor}; }

    /* rules */
    .rule-box { background:${p}08; border:1px solid ${p}20; }
    .rule-title { color:${p}; }
    .rule-body { color:${textMuted}; }

    /* food log labels */
    .food-inp-label { color:${textFaint}; }
    .food-cat-title { color:${sec}; }

    /* chips */
    .chip { font-family:Barlow Condensed,Arial Narrow,Arial,sans-serif; }

    /* stretch tabs */
    .stretch-tab { background:${t.border2}30; color:${textFaint}; }
    .stretch-tab.active { background:${p}; color:#fff; }

    /* buttons */
    .btn-reset { background:${t.card}; border-color:${t.border2}; color:${textFaint}; }
    .add-btn { background:${p}; }
    #theme-btn { background:${p}15; border-color:${p}40; color:${p}; }

    /* theme panel */
    #theme-box { background:${t.card}; border-color:${t.border2}; }

    /* water slider track color hint */
    .water-progress-bar { background:${t.border2}60; }

    /* modal */
    #modal-box { background:${t.card}; border-color:${t.border}; }
    .modal-body { background:${t.border2}30; color:${textMuted}; }

    /* rest timer */
    #rest-timer-bar { background:${p}15; border-color:${p}30; }

    /* page title gradient hint */
    .page-title { color:${p}; }

    /* overview rows */
    .day-breakdown-row { border-bottom-color:${t.border2}; }
    .protein-day { background:${t.card}; border-color:${t.border2}; }

    /* links */
    a { color:${sec}; }

    /* scrollbar */
    ::-webkit-scrollbar-track { background:${t.bg2}; }
    ::-webkit-scrollbar-thumb { background:${t.border2}; border-radius:4px; }
  `;

  // Expose current palette to JS rendering functions via window
  window._theme = { p, sec, a3, textColor, textMuted, textFaint, isLight: !!t.isLight };

  if (typeof renderDayBar === 'function') renderDayBar();
  if (typeof renderPage === 'function' && typeof activeTab !== 'undefined') renderPage(activeTab);
  renderThemeGrid();
}

function renderThemeGrid() {
  const grid = document.getElementById('theme-grid');
  if (!grid) return;
  grid.innerHTML = Object.entries(THEMES).map(([key, t]) => `
    <div class="theme-swatch ${activeTheme===key?'active':''}" onclick="applyTheme('${key}')" style="background:${t.card||'#0F172A'};border:2px solid ${activeTheme===key?t.primary:'#334155'}">
      <div class="theme-swatch-dot" style="background:${t.primary}25;border:2px solid ${t.primary}">${t.emoji}</div>
      <div class="theme-swatch-name" style="color:${activeTheme===key?t.primary:'#F1F5F9'}">${t.name}</div>
      <div class="theme-swatch-sub">${t.sub}</div>
    </div>
  `).join('');
}

function openThemePanel() {
  renderThemeGrid();
  document.getElementById('theme-panel').classList.add('open');
}

function closeThemePanel(e) {
  if (!e || e.target === document.getElementById('theme-panel')) {
    document.getElementById('theme-panel').classList.remove('open');
  }
}

// Load saved theme on start
function loadTheme() {
  const saved = localStorage.getItem('wt_theme');
  if (saved && THEMES[saved]) applyTheme(saved);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
try {
  load();
  loadSuppData();
  updateWeightDisplay();
  updateGoalBadge();
  renderDayBar();
  renderPage('today');
  var _origSwitchTab = switchTab;
  switchTab = function(tabId) {
    _origSwitchTab(tabId);
    if (tabId === 'nutrition') setTimeout(function(){ renderSavedFoodList(); }, 50);
  };
  var _savedTheme = localStorage.getItem('wt_theme');
  if (_savedTheme && THEMES[_savedTheme]) applyTheme(_savedTheme);
} catch(e) {
  document.body.innerHTML = '<div style="padding:20px;font-family:monospace;font-size:13px;color:#EF4444;background:#0F172A;min-height:100vh;word-break:break-all">'
    + '<b>Init error:</b><br>' + (e ? e.message : 'unknown')
    + '<br><br>' + (e && e.stack ? e.stack.split('\n').join('<br>') : '')
    + '</div>';
}
